events { worker_connections 1024; }

http {
    upstream frontend   { server frontend:3000; }
    upstream ai         { server ai-service:8000; }
    upstream memory     { server memory-service:8000; }

    server {
        listen 80;
        server_name localhost;

        location / { proxy_pass http://frontend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/ai/ { rewrite ^/api/ai/(.*) /$1 break; proxy_pass http://ai; }
        location /api/memory/ { rewrite ^/api/memory/(.*) /$1 break; proxy_pass http://memory; }
        location /ws/ { proxy_pass http://ai; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    }
}
