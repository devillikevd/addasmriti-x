services:
  # Next.js Frontend
  - type: web
    name: addasmriti-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://addasmriti-api.onrender.com
      - key: NODE_ENV
        value: production

  # FastAPI Backend
  - type: web
    name: addasmriti-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: addasmriti-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false

  # PostgreSQL Database
  - type: psql
    name: addasmriti-db
    plan: free
    postgresMajorVersion: 15
